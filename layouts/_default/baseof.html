<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en-us" }}">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	{{ partial "meta-title" . }}
	{{ partial "meta-desc" . }}
	<link rel="manifest" href="{{ "manifest.webmanifest" | relURL }}">
	<link rel="icon" href="{{ "favicon.ico" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "icons/apple-touch-icon.png" | relURL }}">
	<link rel="stylesheet" href="{{ "css/normalize.css" | relURL }}">
	<link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
	<link rel="stylesheet" href="{{ "css/lazy-image.css" | relURL }}">
	{{ with .OutputFormats.Get "RSS" -}}
		{{ printf `<link rel="%s" type="%s" href="%s" title="%s">` .Rel .MediaType.Type .RelPermalink $.Site.Title | safeHTML }}
	{{- end }}
	<script defer src="{{ "js/lazy-image.js" | relURL }}"></script>
</head>
<body>
	{{ partial "header" . }}
	{{ block "main" . }}{{ end }}
	{{ partial "footer" . }}
	<script src="{{ "js/scroll.js" | relURL }}"></script>
</body>
</html>
